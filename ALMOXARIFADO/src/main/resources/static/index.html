<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
    <div class="header-title">
        <div class="header-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </div>
        Almoxarifado
    </div>

    <div class="top-controls">
        <div class="filter-pills">
            <button class="pill active" onclick="filtrarMateriais('TODOS', this)">Todos</button>
            <button class="pill" onclick="filtrarMateriais('IN_USE', this)">Em Uso</button>
            <button class="pill" onclick="filtrarMateriais('AVAILABLE', this)">Disponíveis</button>
        </div>

        <div class="date-search-group">
            <div class="search-box">
                <input type="text" id="inputBuscaName" placeholder="Buscar material por nome...">
                <button class="btn-action" onclick="buscarMateriais()" style="border: none; background: transparent; position: absolute; right: 4px; top: 4px; padding: 6px;">🔍</button>
            </div>
            
            <button class="btn-secondary" onclick="window.location.href='https://localhost:8080/leitorQr.html'" style="display: flex; align-items: center; gap: 8px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                Ler QR Code
            </button>

            <button class="btn-primary" onclick="abrirModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Registrar Material
            </button>
        </div>
    </div>

    <div class="main-card">
        <div class="tabs">
            <div class="tab active">Gestão de Materiais</div>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th width="5%"><input type="checkbox"></th>
                    <th width="40%">Material / Status</th>
                    <th width="25%">Tipo de Movimento</th>
                    <th width="10%">Estoque</th>
                    <th width="20%" style="text-align: right;">Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaMateriais">
                <tr><td colspan="5" class="empty-message">Carregando materiais...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="modalCadastro" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Registrar Novo Material</h3>
            <button class="btn-close" onclick="fecharModal()">✖</button>
        </div>
        
        <div class="form-group">
            <label for="cadNome">Nome do Material</label>
            <input type="text" id="cadNome" placeholder="Ex: Furadeira Bosch 600W">
        </div>

        <div class="form-group">
            <label for="cadImagem">Foto do Material</label>
            <input type="file" id="cadImagem" accept="image/*">
        </div>
        
        <div class="form-group">
            <label for="cadMovimento">Tipo de Movimento</label>
            <select id="cadMovimento">
                <option value="EXIT">Saída Liberada (EXIT)</option>
                <option value="PROHIBITED">Proibido (PROHIBITED)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="cadStatus">Status Inicial</label>
            <select id="cadStatus">
                <option value="AVAILABLE">Disponível</option>
                <option value="UNAVAILABLE">Indisponível</option>
                <option value="IN_USE">Em Uso</option>
            </select>
        </div>

        <div class="modal-actions">
            <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
            <button class="btn-primary" onclick="salvarMaterial()">Salvar Material</button>
        </div>
    </div>
</div>

<div id="modalEditar" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Editar Material</h3>
            <button class="btn-close" onclick="fecharModalEditar()">✖</button>
        </div>
        
        <input type="hidden" id="editId">
        <input type="hidden" id="editStatusOriginal">

        <div class="form-group">
            <label for="editStatus">Selecione o novo Status</label>
            <select id="editStatus" onchange="verificarStatusColaborador()">
                <option value="AVAILABLE">Disponível</option>
                <option value="IN_USE">Em Uso</option>
                <option value="UNAVAILABLE">Indisponível</option>
            </select>
        </div>

        <div class="form-group" id="div-colaborador" style="display: none;">
            <label for="editColaborador">Nome do Funcionário</label>
            <input type="text" id="editColaborador" placeholder="Quem está usando o material?">
        </div>

        <div class="form-group">
            <label for="editImagem">Atualizar Foto (Opcional)</label>
            <input type="file" id="editImagem" accept="image/*">
        </div>

        <div class="modal-actions">
            <button class="btn-secondary" onclick="fecharModalEditar()">Cancelar</button>
            <button class="btn-primary" onclick="salvarEdicao()">Salvar Atualização</button>
        </div>
    </div>
</div>

<div id="modalQR" class="modal-overlay">
    <div class="modal-content" style="text-align: center;">
        <div class="modal-header">
            <h3>QR Code do Material</h3>
            <button class="btn-close" onclick="fecharModalQR()">✖</button>
        </div>
        
        <p id="qrNomeMaterial" style="font-weight: 600; color: var(--text-main); margin-bottom: 1.5rem; font-size: 1.1rem;"></p>
        
        <div style="display: flex; justify-content: center; align-items: center; min-height: 220px; margin-bottom: 1.5rem; background: var(--bg-body); border-radius: var(--radius-md); border: 1px dashed var(--border);">
            <p id="qrLoadingText" style="color: var(--text-muted); font-weight: 500;">Buscando QR Code...</p>
            <img id="imgQrCode" src="" alt="QR Code" style="display: none; max-width: 200px; padding: 10px; background: white; box-shadow: var(--shadow-sm); border-radius: var(--radius-sm);">
        </div>

        <div class="modal-actions" style="justify-content: center; gap: 15px;">
            <button class="btn-secondary" onclick="fecharModalQR()">Fechar</button>
            <button class="btn-primary" onclick="imprimirQRCode()" id="btnImprimirQR" style="display: none;">🖨️ Imprimir QR Code</button>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
